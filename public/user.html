<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Profile - MARVEL User Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Comic Neue', cursive;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(237, 29, 36, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 199, 0, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    .nav {
      text-align: center;
      margin-bottom: 20px;
    }
    .nav a {
      color: #FFC700;
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-decoration: none;
      margin: 0 15px;
      transition: all 0.2s;
    }
    .nav a:hover {
      color: #ED1D24;
    }
    .page-title {
      text-align: center;
      margin-bottom: 30px;
    }
    .page-title h1 {
      color: white;
      font-family: 'Bangers', cursive;
      font-size: 3rem;
      letter-spacing: 4px;
      text-shadow: 4px 4px 0 #ED1D24, 6px 6px 0 #000;
      margin: 0;
    }
    .page-title .accent {
      color: #FFC700;
    }
    .user-card {
      background: linear-gradient(145deg, #fff 0%, #f0f0f0 100%);
      padding: 35px;
      margin: 30px auto;
      border: 5px solid #000;
      box-shadow: 8px 8px 0 #000;
      position: relative;
      max-width: 500px;
    }
    .user-card::before {
      content: '★ HERO FILE ★';
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: #ED1D24;
      color: white;
      border: 3px solid #000;
      padding: 5px 15px;
      font-family: 'Bangers', cursive;
      font-size: 1rem;
      letter-spacing: 2px;
    }
    .user-card::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 60px;
      height: 60px;
      background: #FFC700;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .user-card h2 {
      margin: 15px 0 15px 0;
      color: #ED1D24;
      font-family: 'Bangers', cursive;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }
    .user-card p {
      margin: 10px 0;
      color: #333;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .user-card p strong {
      color: #16213e;
    }
    .user-id {
      font-size: 1rem;
      color: #000;
      font-family: 'Bangers', cursive;
      background: #FFC700;
      padding: 5px 12px;
      border: 3px solid #000;
      display: inline-block;
      letter-spacing: 1px;
    }
    .loading {
      text-align: center;
      color: #FFC700;
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }
    .error {
      color: #ED1D24;
      text-align: center;
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      background: #FFC700;
      padding: 15px;
      border: 4px solid #000;
    }
    .pow-decoration {
      position: fixed;
      font-family: 'Bangers', cursive;
      font-size: 2.5rem;
      opacity: 0.1;
      pointer-events: none;
      color: #ED1D24;
    }
    .pow-1 { top: 20%; left: 5%; transform: rotate(-15deg); }
    .pow-2 { bottom: 15%; right: 5%; transform: rotate(15deg); }
  </style>
</head>
<body>
  <div class="pow-decoration pow-1">THWIP!</div>
  <div class="pow-decoration pow-2">SNIKT!</div>

  <div class="nav">
    <a href="/">← HQ</a>
    <a href="/users">All Heroes</a>
  </div>
  
  <div class="page-title">
    <h1>HERO <span class="accent">PROFILE</span></h1>
  </div>

  <div id="user-container">
    <p class="loading">Loading hero file...</p>
  </div>

  <script>
    async function fetchUser() {
      const container = document.getElementById('user-container');
      const id = window.location.pathname.split('/').pop();

      try {
        const response = await fetch('/api/users/' + id);
        if (!response.ok) {
          throw new Error('Failed to fetch user');
        }
        const users = await response.json();

        if (users.length === 0) {
          container.innerHTML = '<p class="error">User not found.</p>';
          return;
        }

        const user = users[0];
        container.innerHTML = `
          <div class="user-card">
            <span class="user-id">ID: ${user.id}</span>
            <h2>${escapeHtml(user.name)}</h2>
            <p><strong>Email:</strong> ${escapeHtml(user.email)}</p>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<p class="error">Error: ${error.message}</p>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    fetchUser();
  </script>
</body>
</html>
