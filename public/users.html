<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heroes - MARVEL User Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Comic Neue', cursive;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(237, 29, 36, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 199, 0, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    .nav {
      text-align: center;
      margin-bottom: 20px;
    }
    .nav a {
      color: #FFC700;
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-decoration: none;
      margin: 0 15px;
      transition: all 0.2s;
    }
    .nav a:hover {
      color: #ED1D24;
      transform: scale(1.1);
    }
    .page-title {
      text-align: center;
      margin-bottom: 30px;
    }
    .page-title h1 {
      color: white;
      font-family: 'Bangers', cursive;
      font-size: 3rem;
      letter-spacing: 4px;
      text-shadow: 4px 4px 0 #ED1D24, 6px 6px 0 #000;
      margin: 0;
    }
    .page-title .accent {
      color: #FFC700;
    }
    .btn {
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      letter-spacing: 2px;
      padding: 15px 30px;
      border: 3px solid #000;
      cursor: pointer;
      margin: 10px 8px;
      transition: all 0.2s ease;
      text-transform: uppercase;
      position: relative;
      box-shadow: 4px 4px 0 #000;
      background: #ED1D24;
      color: white;
    }
    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #000;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }
    .action-area {
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border: 3px solid #FFC700;
      border-radius: 10px;
      margin: 20px 0;
    }
    #users-container {
      margin-top: 20px;
    }
    .user-card {
      background: linear-gradient(145deg, #fff 0%, #f0f0f0 100%);
      padding: 20px;
      margin: 15px 0;
      border: 4px solid #000;
      box-shadow: 6px 6px 0 #000;
      position: relative;
      transform: rotate(-0.5deg);
      transition: all 0.2s ease;
    }
    .user-card:nth-child(even) {
      transform: rotate(0.5deg);
    }
    .user-card:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 8px 8px 0 #ED1D24;
    }
    .user-card::before {
      content: '★';
      position: absolute;
      top: -15px;
      left: 20px;
      background: #FFC700;
      border: 3px solid #000;
      padding: 5px 10px;
      font-size: 1rem;
    }
    .user-card h3 {
      margin: 0 0 8px 0;
      color: #ED1D24;
      font-family: 'Bangers', cursive;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }
    .user-card p {
      margin: 0;
      color: #333;
      font-size: 1.1rem;
      font-weight: bold;
    }
    .user-id {
      font-size: 0.9rem;
      color: #666;
      font-family: 'Comic Neue', cursive;
      background: #FFC700;
      padding: 2px 8px;
      border: 2px solid #000;
      display: inline-block;
      margin-bottom: 10px;
    }
    .loading {
      text-align: center;
      color: #FFC700;
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }
    .error {
      color: #ED1D24;
      text-align: center;
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      background: #FFC700;
      padding: 15px;
      border: 4px solid #000;
    }
    .pow-decoration {
      position: fixed;
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      opacity: 0.1;
      pointer-events: none;
      color: #FFC700;
    }
    .pow-1 { top: 15%; right: 5%; transform: rotate(10deg); }
    .pow-2 { bottom: 25%; left: 3%; transform: rotate(-10deg); }
  </style>
</head>
<body>
  <div class="pow-decoration pow-1">KAPOW!</div>
  <div class="pow-decoration pow-2">ZOOM!</div>

  <div class="nav">
    <a href="/">← Back to HQ</a>
  </div>
  
  <div class="page-title">
    <h1>ALL <span class="accent">HEROES</span></h1>
  </div>
  
  <div class="action-area">
    <button class="btn" onclick="fetchUsers()">⚡ Refresh</button>
  </div>

  <div id="users-container">
    <p class="loading">Assembling heroes...</p>
  </div>

  <script>
    async function fetchUsers() {
      const container = document.getElementById('users-container');
      container.innerHTML = '<p class="loading">Loading users...</p>';

      try {
        const response = await fetch('/api/users');
        if (!response.ok) {
          throw new Error('Failed to fetch users');
        }
        const users = await response.json();

        if (users.length === 0) {
          container.innerHTML = '<p class="loading">No users found.</p>';
          return;
        }

        container.innerHTML = users.map(user => `
          <div class="user-card">
            <span class="user-id">ID: ${user.id}</span>
            <h3>${escapeHtml(user.name)}</h3>
            <p>${escapeHtml(user.email)}</p>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = `<p class="error">Error: ${error.message}</p>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load users automatically when page loads
    fetchUsers();
  </script>
</body>
</html>
